# Terminal multiplexer
# https://github.com/tmux/tmux

# Set default shell to zsh (Homebrew on macOS, /bin/zsh elsewhere)
if-shell "test -x /opt/homebrew/bin/zsh" \
  "set-option -g default-command /opt/homebrew/bin/zsh; set-option -g default-shell /opt/homebrew/bin/zsh" \
  "set-option -g default-command /bin/zsh; set-option -g default-shell /bin/zsh"

# Color Support
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

## Enable full color support for modern terminals
set-option -sa terminal-overrides ',xterm*:Tc'

# ============================================================================
# Prefix
# ============================================================================

# Change prefix from Ctrl+b to Ctrl+Space (modern standard)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ============================================================================
# General Settings
# ============================================================================

# Reload configuration
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Vim mode
setw -g mode-keys vi
set -g status-keys vi

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback history
set -g history-limit 50000

# Enable mouse support
set -g mouse on

# Faster escape time (critical for vim)
set -sg escape-time 0

# Enable focus events (for vim autoread)
set -g focus-events on

# ============================================================================
# Pane Navigation (via vim-tmux-navigator — no prefix needed)
# ============================================================================

# Ctrl+h/j/k/l navigates both tmux panes and vim splits seamlessly.
# Handled by the vim-tmux-navigator plugin (tmux + nvim sides).

# ============================================================================
# Splits
# ============================================================================

# Intuitive split bindings (visual mnemonics)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# ============================================================================
# Pane Resize (Shift+HJKL, repeatable)
# ============================================================================

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================================
# Vi Copy Mode
# ============================================================================

bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ============================================================================
# TUI Tool Popups
# ============================================================================

bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind b display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "btop"
bind k display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "k9s"

# ============================================================================
# Plugins
# ============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Resurrect: persist sessions across restarts
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @plugin 'catppuccin/tmux'

# Catppuccin theme configuration
set -g @catppuccin_flavor 'mocha'

set -g @catppuccin_status_background "default"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_date_time_text "%H:%M:%S"
set -g @catppuccin_status_modules_right "application date_time session"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_fill "all"
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_kube_context_color "#{thm_black}"
set -g @catppuccin_kube_namespace_color "#{thm_black}"
set -g @catppuccin_directory_text "#{pane_current_path}"

# Catppuccin theme configuration
source-file ~/.config/tmux/catppuccin.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
